name: Platform CI

on:
  push:
    branches: [main, master, develop]
  pull_request:
    branches: [main, master, develop]

jobs:
  build-test-smoke:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: autonomuscrm_test
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: test_password
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10
          --health-start-period 10s

    env:
      ConnectionStrings__DefaultConnection: Host=127.0.0.1;Port=5432;Database=autonomuscrm_test;Username=postgres;Password=test_password
      INTEGRATION_TEST_CONNECTION_STRING: Host=127.0.0.1;Port=5432;Database=autonomuscrm_test;Username=postgres;Password=test_password
      Database__AutoMigrate: "true"
      Jwt__Key: CI-Only-SuperSecretKey-AtLeast32Characters!
      IntegrationEncryption__Key: Q0ktSW50ZWdyYXRpb25FbmNyeXB0aW9uS2V5MzJCeXRlc01pbg==
      EventBus__Provider: InMemory
      Seed__Enabled: "true"
      Seed__AdminPassword: Admin123!

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'

      - name: Restore
        run: dotnet restore AutonomusCRM.sln

      - name: Build
        run: dotnet build AutonomusCRM.sln --no-restore -c Release

      - name: Wait for PostgreSQL
        run: |
          for i in $(seq 1 30); do
            if pg_isready -h 127.0.0.1 -p 5432 -U postgres; then echo "PostgreSQL ready"; exit 0; fi
            echo "Waiting for PostgreSQL... ($i/30)"
            sleep 2
          done
          echo "PostgreSQL not ready after 60s"
          exit 1

      - name: Unit tests
        run: dotnet test AutonomusCRM.Tests/AutonomusCRM.Tests.csproj -c Release --no-build --filter "Category!=Integration&Category!=Phase4Validation" --verbosity normal

      - name: Integration tests
        run: dotnet test AutonomusCRM.Tests/AutonomusCRM.Tests.csproj --no-build -c Release --filter "Category=Integration" --verbosity normal --logger "console;verbosity=detailed" --results-directory TestResults --logger "trx;LogFileName=integration.trx" 2>&1 | tee integration.log
      - name: Integration failure summary
        if: failure()
        run: grep -E "Failed |Error Message:|PostgreSQL|Assert\." integration.log | tail -80 || true

      - name: Upload integration test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: integration-test-results
          path: TestResults/
          retention-days: 7

      - name: Publish API
        run: dotnet publish AutonomusCRM.API/AutonomusCRM.API.csproj -c Release -o ./publish/api

      - name: Smoke health (optional local)
        run: |
          echo "Release artifact built. Deploy smoke: curl /health and /health/ready"
