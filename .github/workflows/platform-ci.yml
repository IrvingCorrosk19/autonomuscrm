name: Platform CI

on:
  push:
    branches: [main, master, develop]
  pull_request:
    branches: [main, master, develop]

jobs:
  build-test-smoke:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: autonomuscrm
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'

      - name: Restore
        run: dotnet restore AutonomusCRM.sln

      - name: Build
        run: dotnet build AutonomusCRM.sln --no-restore -c Release

      - name: Test
        run: dotnet test AutonomusCRM.Tests/AutonomusCRM.Tests.csproj -c Release --no-build --verbosity normal
        env:
          ConnectionStrings__DefaultConnection: Host=localhost;Port=5432;Database=autonomuscrm;Username=postgres;Password=postgres

      - name: Publish API
        run: dotnet publish AutonomusCRM.API/AutonomusCRM.API.csproj -c Release -o ./publish/api

      - name: Smoke health (optional local)
        run: |
          echo "Release artifact built. Deploy smoke: curl /health and /health/ready"
