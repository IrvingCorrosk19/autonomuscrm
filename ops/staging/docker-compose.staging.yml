name: autonomusflow-staging-infra

# Infrastructure-only staging stack. Run API/Worker locally with ASPNETCORE_ENVIRONMENT=Staging
# pointing ConnectionStrings/RabbitMQ/Redis to these services.

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: autonomuscrm_staging
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-staging_password}
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d autonomuscrm_staging"]
      interval: 10s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "6380:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  rabbitmq:
    image: rabbitmq:3-management-alpine
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER:-autonomus}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD:-staging_rabbit}
    ports:
      - "5673:5672"
      - "15673:15672"
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10
