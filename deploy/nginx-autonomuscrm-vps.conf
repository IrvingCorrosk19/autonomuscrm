# AutonomusCRM — preview IP:8091 + producción https://crm.autonomousflow.lat
# API interna: http://127.0.0.1:5080

# Preview (sin tocar Madison 8090)
server {
    listen 8091;
    listen [::]:8091;
    server_name _;

    client_max_body_size 32m;

    location / {
        proxy_pass http://127.0.0.1:5080;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection keep-alive;
        proxy_cache_bypass $http_upgrade;
    }

    location = /health {
        proxy_pass http://127.0.0.1:5080/health;
        access_log off;
    }

    gzip on;
    gzip_types text/css application/javascript application/json image/svg+xml;
}

# HTTP — ACME + redirect HTTPS
server {
    listen 80;
    listen [::]:80;
    server_name crm.autonomousflow.lat;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
        allow all;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# HTTPS — producción
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name crm.autonomousflow.lat;

    ssl_certificate /etc/letsencrypt/live/autonomousflow.lat/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/autonomousflow.lat/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    client_max_body_size 32m;

    location / {
        proxy_pass http://127.0.0.1:5080;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection upgrade;
        proxy_cache_bypass $http_upgrade;
    }

    location = /health {
        proxy_pass http://127.0.0.1:5080/health;
        access_log off;
    }

    add_header X-Site "AutonomusCRM" always;
    gzip on;
    gzip_types text/css application/javascript application/json image/svg+xml;
}
