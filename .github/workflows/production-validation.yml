name: Production Validation (Phase 4)

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'ops/validation/**'
      - 'AutonomusCRM.Tests/Validation/**'
      - '.github/workflows/production-validation.yml'

jobs:
  abos-production-validation:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: autonomuscrm_test
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: test_password
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10
          --health-start-period 10s

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      rabbitmq:
        image: rabbitmq:3-management-alpine
        env:
          RABBITMQ_DEFAULT_USER: autonomus
          RABBITMQ_DEFAULT_PASS: staging_rabbit
        ports:
          - 5672:5672
        options: >-
          --health-cmd "rabbitmq-diagnostics -q ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10

    env:
      ConnectionStrings__DefaultConnection: Host=127.0.0.1;Port=5432;Database=autonomuscrm_test;Username=postgres;Password=test_password
      INTEGRATION_TEST_CONNECTION_STRING: Host=127.0.0.1;Port=5432;Database=autonomuscrm_test;Username=postgres;Password=test_password
      ConnectionStrings__Redis: 127.0.0.1:6379
      RabbitMQ__HostName: 127.0.0.1
      RabbitMQ__UserName: autonomus
      RabbitMQ__Password: staging_rabbit
      Jwt__Key: CI-Only-SuperSecretKey-AtLeast32Characters!
      IntegrationEncryption__Key: Q0ktSW50ZWdyYXRpb25FbmNyeXB0aW9uS2V5MzJCeXRlc01pbg==
      EventBus__Provider: InMemory
      Seed__Enabled: "true"
      Seed__AdminPassword: Admin123!
      AI__Enabled: "true"

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'

      - name: Restore and build
        run: |
          mkdir -p TestResults/phase4
          dotnet restore AutonomusCRM.sln
          dotnet build AutonomusCRM.sln -c Release --no-restore

      - name: Wait for infrastructure (postgres, redis, rabbitmq)
        run: |
          for i in $(seq 1 30); do
            pg_isready -h 127.0.0.1 -p 5432 -U postgres || { sleep 2; continue; }
            python3 -c "import socket; s=socket.socket(); s.settimeout(2); s.connect(('127.0.0.1',6379)); s.close()" || { sleep 2; continue; }
            python3 -c "import socket; s=socket.socket(); s.settimeout(2); s.connect(('127.0.0.1',5672)); s.close()" || { sleep 2; continue; }
            echo "Infrastructure ports open: postgres=5432 redis=6379 rabbitmq=5672"
            exit 0
          done
          exit 1

      - name: Phase 4 operational validation (in-process API + PostgreSQL)
        run: |
          dotnet test AutonomusCRM.Tests/AutonomusCRM.Tests.csproj -c Release --no-build \
            --filter "Category=Phase4Validation" \
            --verbosity normal \
            --logger "trx;LogFileName=phase4-validation.trx" \
            --results-directory TestResults/phase4

      - name: OpenAI live smoke (optional secret)
        continue-on-error: true
        env:
          AI__OpenAI__ApiKey: ${{ secrets.AI_OPENAI_API_KEY }}
        run: |
          if [ -z "${AI__OpenAI__ApiKey:-}" ]; then
            echo '{"status":"BLOCKED","reason":"no AI_OPENAI_API_KEY secret"}' > TestResults/phase4/llm-live-smoke.json
            exit 0
          fi
          echo "Live OpenAI smoke requires deployed API URL — blocked in in-process CI mode" \
            | tee TestResults/phase4/llm-live-smoke.json

      - name: Write job summary
        if: always()
        run: |
          echo "## ABOS Phase 4 Validation" >> "$GITHUB_STEP_SUMMARY"
          echo "- Infra: postgres + redis + rabbitmq service containers" >> "$GITHUB_STEP_SUMMARY"
          echo "- API: WebApplicationFactory in-process (same as integration tests)" >> "$GITHUB_STEP_SUMMARY"
          echo "- Tests: Category=Phase4Validation" >> "$GITHUB_STEP_SUMMARY"

      - name: Upload Phase 4 evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: abos-phase4-validation
          path: TestResults/
          retention-days: 14
