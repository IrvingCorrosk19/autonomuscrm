name: autonomuscrm-local

services:
  postgres:
    image: postgres:16-alpine
    container_name: autonomuscrm-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: autonomuscrm
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-Panama2020$}
    command: >
      postgres
      -c shared_buffers=256MB
      -c max_connections=250
      -c log_statement=none
      -c log_min_duration_statement=300
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./ops/postgres/backups:/backups
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d autonomuscrm"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks: [autonomus_backend]

  redis:
    image: redis:7-alpine
    container_name: autonomuscrm-redis
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes", "--save", "60", "1000"]
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks: [autonomus_backend]

  rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: autonomuscrm-rabbitmq
    restart: unless-stopped
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER:-autonomus}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASS:-autonomus123}
      RABBITMQ_DEFAULT_VHOST: "/"
    ports:
      - "5672:5672"
      - "15672:15672"
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks: [autonomus_backend]

  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.107.0
    container_name: autonomuscrm-otel-collector
    restart: unless-stopped
    command: ["--config=/etc/otel-collector-config.yaml"]
    volumes:
      - ./ops/observability/otel-collector-config.yaml:/etc/otel-collector-config.yaml:ro
    ports:
      - "4317:4317"
      - "4318:4318"
      - "8889:8889"
    depends_on:
      tempo:
        condition: service_started
      loki:
        condition: service_started
    networks: [autonomus_backend]

  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    container_name: autonomuscrm-api
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      otel-collector:
        condition: service_started
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_URLS: http://+:8080
      ConnectionStrings__DefaultConnection: Host=postgres;Port=5432;Database=autonomuscrm;Username=postgres;Password=${POSTGRES_PASSWORD:-Panama2020$}
      ConnectionStrings__Redis: redis:6379
      Jwt__Key: DevOnly-SuperSecretKey-AtLeast32Characters-Long!
      RabbitMQ__HostName: rabbitmq
      RabbitMQ__UserName: ${RABBITMQ_USER:-autonomus}
      RabbitMQ__Password: ${RABBITMQ_PASS:-autonomus123}
      EventBus__Provider: RabbitMQ
      OpenTelemetry__OtlpEndpoint: http://otel-collector:4317
      OpenTelemetry__EnableConsoleExporter: "false"
      Seed__Enabled: "true"
      Seed__AdminPassword: Admin123!
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 10
    networks: [autonomus_backend]

  workers:
    build:
      context: .
      dockerfile: Dockerfile.workers
    container_name: autonomuscrm-workers
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      otel-collector:
        condition: service_started
    environment:
      ConnectionStrings__DefaultConnection: Host=postgres;Port=5432;Database=autonomuscrm;Username=postgres;Password=${POSTGRES_PASSWORD:-Panama2020$}
      ConnectionStrings__Redis: redis:6379
      RabbitMQ__HostName: rabbitmq
      RabbitMQ__UserName: ${RABBITMQ_USER:-autonomus}
      RabbitMQ__Password: ${RABBITMQ_PASS:-autonomus123}
      EventBus__Provider: RabbitMQ
      OpenTelemetry__OtlpEndpoint: http://otel-collector:4317
      OpenTelemetry__EnableConsoleExporter: "false"
    networks: [autonomus_backend]

  prometheus:
    image: prom/prometheus:v2.54.1
    container_name: autonomuscrm-prometheus
    restart: unless-stopped
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--web.enable-lifecycle"
    volumes:
      - ./ops/observability/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    ports:
      - "9090:9090"
    depends_on:
      - otel-collector
    networks: [autonomus_backend]

  loki:
    image: grafana/loki:3.1.0
    container_name: autonomuscrm-loki
    restart: unless-stopped
    command: ["-config.file=/etc/loki/config.yml"]
    volumes:
      - ./ops/observability/loki-config.yml:/etc/loki/config.yml:ro
      - loki_data:/loki
    ports:
      - "3100:3100"
    networks: [autonomus_backend]

  tempo:
    image: grafana/tempo:2.6.0
    container_name: autonomuscrm-tempo
    restart: unless-stopped
    user: "0:0"
    command: ["-config.file=/etc/tempo.yml"]
    volumes:
      - ./ops/observability/tempo-config.yml:/etc/tempo.yml:ro
      - tempo_data:/tmp/tempo
    ports:
      - "3200:3200"
      - "4319:4317"
    networks: [autonomus_backend]

  grafana:
    image: grafana/grafana:11.1.0
    container_name: autonomuscrm-grafana
    restart: unless-stopped
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASS:-admin123}
      GF_AUTH_ANONYMOUS_ENABLED: "false"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./ops/observability/grafana/provisioning:/etc/grafana/provisioning:ro
    ports:
      - "3000:3000"
    depends_on:
      - prometheus
      - loki
      - tempo
    networks: [autonomus_backend]

volumes:
  postgres_data:
  redis_data:
  rabbitmq_data:
  prometheus_data:
  grafana_data:
  loki_data:
  tempo_data:

networks:
  autonomus_backend:
    name: autonomus_backend
